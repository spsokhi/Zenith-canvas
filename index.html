  <body>
    <div id="app">
      <!-- Drawing surface -->
      <canvas id="scene" aria-label="Zenith Canvas drawing surface"></canvas>
      <!-- Layer for on-canvas text editing -->
      <div id="overlay"></div>

      <!-- Top-center floating toolbar -->
      <div id="toolbar" class="floating-panel" role="toolbar" aria-label="Tools"></div>

      <!-- Contextual properties panel -->
      <aside id="properties" class="floating-panel" aria-label="Properties"></aside>

      <!-- Top-left brand + utility actions -->
      <div id="top-left" class="corner">
        <div class="brand"><span class="brand-mark">✦</span><span class="brand-name">Zenith Canvas</span></div>
      </div>

      <!-- Top-right global actions -->
      <div id="top-right" class="corner"></div>

      <!-- Bottom-left zoom controls -->
      <div id="bottom-left" class="corner"></div>

      <!-- Bottom-right hints -->
      <div id="bottom-right" class="corner">
        <div class="hint" id="hint">Scroll to pan · Ctrl+Scroll to zoom</div>
      </div>

      <!-- Footer credit -->
      <div id="credit">Made in India with <span class="heart">❤️</span> by Sukhi</div>
    </div>

  </body>
